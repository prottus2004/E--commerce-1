<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opulent Outlet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome -->
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            background-image: url('https://images.app.goo.gl/zEPgASaaipyJsUxS7');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header {
            position: relative;
            height: 100vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }

        .top-icons {
            position: absolute;
            top: 10px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .top-icons a {
            color: white;
            font-size: 1.5em;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .top-icons a:hover {
            transform: scale(1.2);
            color: #ff758c;
        }

        header h1 {
            font-size: 3.8em;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            margin: 1em 0;
            font-size: 1.4em;
            max-width: 600px;
        }

        header button {
            padding: 1em 2.5em;
            font-size: 1.2em;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0px 10px 15px rgba(255, 120, 150, 0.4);
            transition: transform 0.3s ease;
        }

        header button:hover {
            transform: scale(1.1);
            background: linear-gradient(to right, #ff7eb3, #ff758c);
        }

        section {
            padding: 2em;
            margin: 2em auto;
            max-width: 1200px;
            border-radius: 15px;
            background: linear-gradient(to bottom right, #fbc2eb, #a18cd1);
            color: white;
        }

        section h2 {
            text-align: center;
            margin-bottom: 1em;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5em;
            justify-content: center;
        }

        .category img {
            width: 80px;
            height: 80px;
            margin-bottom: 0.5em;
            border-radius: 50%;
            border: 3px solid white;
        }

        footer {
            text-align: center;
            padding: 1.5em;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            color: white;
            font-size: 1em;
        }

        footer .social-icons a {
            margin: 0 15px;
            font-size: 2em;
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer .social-icons a:hover {
            color: #ff758c;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <header>
        <div class="top-icons">
            <a href="#help" title="Help"><i class="fas fa-question-circle"></i></a>
            <a href="#return-policy" title="Return Policy"><i class="fas fa-undo-alt"></i></a>
            <a href="#privacy-policy" title="Privacy Policy"><i class="fas fa-user-shield"></i></a>
        </div>
        <h1>OPULENT OUTLET</h1>
        <p>Discover vibrant fashion collections designed to make a statement. Shop now and express your style!</p>
        <button>Explore Now</button>
    </header>

    <!-- Sections ... -->

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Opulent Outlet. All Rights Reserved.</p>
        <div class="social-icons">
            <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        </div>
    </footer>
</body>
</html>
