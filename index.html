<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opulent Outlet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome -->
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            background-image: url('https://images.app.goo.gl/zEPgASaaipyJsUxS7');
            background-size: cover;  /* Ensures the image covers the whole page */
            background-position: center;  /* Centers the image */
            background-repeat: no-repeat;  /* Prevents the image from repeating */
        }

        header {
            position: relative;
            background-image: url(''); /* Background Image */
            background-size: cover;
            background-position: center;
            height: 100vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }

        header h1 {
            font-size: 3.8em;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            margin: 1em 0;
            font-size: 1.4em;
            max-width: 600px;
        }

        header button {
            padding: 1em 2.5em;
            font-size: 1.2em;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0px 10px 15px rgba(255, 120, 150, 0.4);
            transition: transform 0.3s ease;
        }

        header button:hover {
            transform: scale(1.1);
            background: linear-gradient(to right, #ff7eb3, #ff758c);
        }

        section {
            padding: 2em;
            margin: 2em auto;
            max-width: 1200px;
            border-radius: 15px;
            background: linear-gradient(to bottom right, #fbc2eb, #a18cd1);
            color: white;
        }

        section h2 {
            text-align: center;
            margin-bottom: 1em;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5em;
            justify-content: center;
        }

        .category, .subcategory {
            text-align: center;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            padding: 1.5em;
            border-radius: 15px;
            width: 200px;
            cursor: pointer;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .category:hover, .subcategory:hover {
            transform: translateY(-10px);
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.3);
        }

        .category img, .subcategory img {
            width: 80px;
            height: 80px;
            margin-bottom: 0.5em;
            border-radius: 50%;
            border: 3px solid white;
        }

        .subcategory {
            background: white;
            color: #333;
            font-weight: bold;
            border-radius: 15px;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.3s ease;
            margin: 0.5em;
            padding: 0.8em 1.2em;
        }

        .subcategory:hover {
            background: #fff1e6;
            transform: translateY(-5px);
        }

        footer {
            text-align: center;
            padding: 1.5em;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            color: white;
            font-size: 1em;
        }

        footer .social-icons {
            margin-top: 1em;
        }

        footer .social-icons a {
            margin: 0 15px;
            font-size: 2em;  /* Adjust size as needed */
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer .social-icons a:hover {
            color: #ff758c;  /* Change color on hover */
        }

        /* Add styles for forms */
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2em;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 1.5em;
        }

        .form-container input, .form-container button {
            width: 100%;
            padding: 1em;
            margin: 0.5em 0;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .form-container button {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .form-container button:hover {
            transform: scale(1.05);
        }

        .form-container a {
            text-align: center;
            display: block;
            color: #ff758c;
            text-decoration: none;
            margin-top: 1em;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <header>
        <h1>OPULENT OUTLET</h1>
        <p>Discover vibrant fashion collections designed to make a statement. Shop now and express your style!</p>
        <button>Explore Now</button>
    </header>

    <!-- Login Form -->
    <section class="form-container">
        <h2>Login</h2>
        <form action="#">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="#">Forgot Password?</a>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </section>

    <!-- Sign Up Form -->
    <section class="form-container">
        <h2>Sign Up</h2>
        <form action="#">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </section>

    <!-- Privacy Policy Link -->
    <section>
        <h2><a href="privacy-policy.html" style="color: #ff758c;">Privacy Policy</a></h2>
    </section>

    <!-- Return Policy Link -->
    <section>
        <h2><a href="return-policy.html" style="color: #ff758c;">Return Policy</a></h2>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Opulent Outlet. All Rights Reserved.</p>
        <div class="social-icons">
            <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        </div>
    </footer>
</body>
</html>
